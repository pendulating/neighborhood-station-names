name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package mod
        run: |
          cd dist
          zip -r "../neighborhood-station-names-${GITHUB_REF_NAME}.zip" .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            neighborhood-station-names-${{ github.ref_name }}.zip
            dist/manifest.json
